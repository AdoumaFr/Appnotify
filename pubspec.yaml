name: appguard
description: AppGuard - Gestionnaire de temps d'ecran (Windows + Android)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Platform paths (AppData/AppSupport)
  path_provider: ^2.1.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Installed apps / usage (Android)
  device_apps: ^2.2.0
  usage_stats: ^1.2.0

  # Windows process monitoring helpers (optional)
  win32: ^5.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
